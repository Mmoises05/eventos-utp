services:
  - type: web
    name: eventos-utp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
